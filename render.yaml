services:
  # The Node.js Core API Backend
  - type: web
    name: paypee-api
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # The React.js Frontend Application
  - type: web
    name: paypee-frontend
    env: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
